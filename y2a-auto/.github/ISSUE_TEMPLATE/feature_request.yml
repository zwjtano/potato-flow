name: 功能建议
description: 提出新的功能、平台支持或流程改进建议。
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        请说明具体使用场景和预期收益。不要提交 Cookie、密钥、账号、私人视频地址或第三方服务凭据。
  - type: textarea
    id: problem
    attributes:
      label: 使用场景与当前限制
      description: 你想完成什么？现有功能在哪一步无法满足需求？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的解决方案
      description: 描述理想的交互、配置或自动化流程。
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: 涉及功能
      options:
        - 下载或任务管理
        - AcFun
        - bilibili
        - 字幕或 ASR
        - AI 元信息
        - YouTube 监控
        - CookieCloud 或通知
        - FFmpeg 或转码
        - Web 界面或安全
        - Docker、Windows 便携包或本地运行
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: environments
    attributes:
      label: 希望支持的部署方式
      options:
        - label: Docker
        - label: Python 本地运行
        - label: Windows 便携包
  - type: textarea
    id: alternatives
    attributes:
      label: 当前替代方案
      description: 是否已有手动操作、脚本或其他工具？其限制是什么？
  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      description: 可补充公开可访问的文档、示意图或实现想法；请先删除敏感信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 我没有提交 Cookie、密钥、密码、Token、Webhook、账号或私人内容。
          required: true
