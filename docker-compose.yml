services:
  potato-flow:
    build:
      context: .
      dockerfile: Dockerfile
    image: potato-flow:local
    container_name: potato-flow
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    ports:
      - "5001:5001"
    environment:
      TZ: Asia/Shanghai
      PORT: "5001"
      AUTO_START_RECORDER: "1"
    volumes:
      - ./docker-data:/data
